spring:
  application:
    name: dtached-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: 8080

# JWT config
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000  # 24 hours

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
