spring:
  application:
    name: dtached-api
  profiles:
    active: dev

server:
  port: 8080

# JWT config
app:
  jwt:
    secret: ${JWT_SECRET:dtached-dev-secret-key-change-in-production-min-256-bits-required}
    expiration-ms: 86400000  # 24 hours

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
